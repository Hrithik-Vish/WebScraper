name: Test Scraper Connection
on: [workflow_dispatch] # This lets you run it manually whenever you want

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run connection test
        run: |
          python -c "import requests; r = requests.get('https://asurascans.com', headers={'User-Agent': 'Mozilla/5.0'}); print(f'Status Code: {r.status_code}'); print(r.text[:500])"

name: Test Scraper Connection
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run connection test
        run: |
          python3 << 'EOF'
          import requests

          urls = [
              "https://manhuaus.com",
              "https://novelarrow.com",
              "https://mangadex.org",
              "https://flamecomics.xyz",
              "https://anikototv.to/home",
          ]

          for url in urls:
              print("=" * 60)
              print(f"URL: {url}")
              try:
                  r = requests.get(url, headers={'User-Agent': 'Mozilla/5.0'}, timeout=15)
                  print(f"Status Code: {r.status_code}")
                  print(r.text[:500])
              except Exception as e:
                  print(f"ERROR: {e}")
              print()
          EOF

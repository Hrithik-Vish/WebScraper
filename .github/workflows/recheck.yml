name: Test API Endpoints
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run connection test
        run: |
          python3 << 'EOF'
          import requests

          url = "https://api.mangadex.org/chapter"
          params = {"order[readableAt]": "desc"}

          print("=" * 60)
          print(f"URL: {url}")
          try:
              r = requests.get(
                  url,
                  params=params,
                  headers={'User-Agent': 'Mozilla/5.0'},
                  timeout=15
              )
              print(f"Status Code: {r.status_code}")
              print(r.text[:500])
          except Exception as e:
              print(f"ERROR: {e}")
          print()
          EOF
